name: Android CI with Firebase Test Lab

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create keystore.properties for CI
        shell: bash
        run: |
          cat <<EOF > keystore.properties
          NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK and androidTest APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload androidTest APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest-apk
          path: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  firebase-test-lab:
    needs: test-and-build
    runs-on: ubuntu-latest
    # Secrets are not passed to workflows from forked PRs; empty secrets also break auth@v2.
    # Prefer GCP_FIREBASE_SERVICE_ACCOUNT_BASE64 (single-line base64 of the .json file) to avoid
    # UTF-16 / BOM / multiline paste issues on Windows.
    if: >
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.GCP_FIREBASE_SERVICE_ACCOUNT != '' ||
        secrets.GCP_FIREBASE_SERVICE_ACCOUNT_BASE64 != '') &&
      secrets.GCP_PROJECT_ID != ''

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: apks

      - name: Download androidTest APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-androidTest-apk
          path: apks

      - name: Prepare GCP service account JSON
        id: gcp_creds
        shell: bash
        env:
          GCP_SA_JSON: ${{ secrets.GCP_FIREBASE_SERVICE_ACCOUNT }}
          GCP_SA_B64: ${{ secrets.GCP_FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/gcp-sa.json"
          if [ -n "${GCP_SA_B64}" ]; then
            printf '%s' "${GCP_SA_B64}" | base64 --decode > "${OUT}"
          elif [ -n "${GCP_SA_JSON}" ]; then
            printf '%s' "${GCP_SA_JSON}" > "${OUT}"
          else
            echo "::error::Set GCP_FIREBASE_SERVICE_ACCOUNT_BASE64 (recommended) or GCP_FIREBASE_SERVICE_ACCOUNT"
            exit 1
          fi
          python3 -c 'import json,sys; json.load(open(sys.argv[1], encoding="utf-8"))' "${OUT}"
          {
            echo 'credentials_json<<CREDS_JSON_EOF'
            cat "${OUT}"
            echo 'CREDS_JSON_EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate in Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.gcp_creds.outputs.credentials_json }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Run UI tests in Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --app apks/app-debug.apk \
            --test apks/app-debug-androidTest.apk \
            --device model=Pixel2,version=30,locale=en,orientation=portrait \
            --timeout 15m \
            --use-orchestrator
