name: Android CI with Firebase Test Lab

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create keystore.properties for CI
        shell: bash
        run: |
          cat <<EOF > keystore.properties
          NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK and androidTest APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Authenticate in Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_FIREBASE_SERVICE_ACCOUNT }}"

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Run UI tests in Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=Pixel2,version=30,locale=en,orientation=portrait \
            --timeout 15m \
            --use-orchestrator

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
